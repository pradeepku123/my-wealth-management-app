<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid px-3">
        <button class="sidebar-toggle-btn" (click)="onToggleSidebar()" title="Toggle Sidebar">
            <i class="bi bi-layout-sidebar-inset fs-5"></i>
        </button>

        <div class="d-flex align-items-center gap-2 ms-auto">
            <!-- Live market indicator -->
            <div class="market-badge d-none d-md-flex align-items-center gap-2">
                <span class="live-dot"></span>
                <span class="small fw-medium">Markets Live</span>
            </div>

            <!-- Theme Toggle -->
            <button class="icon-btn" (click)="onToggleTheme()" title="Toggle Theme">
                <i class="bi" [class.bi-moon-fill]="!themeService.isDark()"
                    [class.bi-sun-fill]="themeService.isDark()"></i>
            </button>

            @if (showSessionTimer) {
            <div class="session-badge d-flex align-items-center gap-1">
                <i class="bi bi-clock-history small"></i>
                <span>{{ sessionTimeRemaining }}</span>
            </div>
            }

            <div class="d-flex align-items-center gap-2">
                <div class="text-end d-none d-md-block">
                    <div class="user-name">{{ userName }}</div>
                    <div class="user-role">{{ userRole }}</div>
                </div>
                <div class="user-avatar">
                    {{ getInitials(userName) }}
                </div>
            </div>
        </div>
    </div>
</nav>
